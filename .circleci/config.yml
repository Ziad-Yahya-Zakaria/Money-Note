version: 2.1

jobs:
  build-android:
    docker:
      - image: cimg/android:2024.01-node
    steps:
      - checkout
      
      - run:
          name: Install Rust and Android NDK
          command: |
            # 1. تثبيت Rust (بما إنه اتثبت قبل كدة فده هيأكد وجوده بس)
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
            
            # 2. تثبيت الـ NDK بطريقة تمنع خطأ 141
            # استخدمنا --quiet عشان مايطلعش نصوص كتير تسبب المشكلة
            echo "y" | sdkmanager --install "ndk;26.1.10909125" --quiet
            
            # تعريف المسارات
            echo 'export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125' >> $BASH_ENV
            echo 'export NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125' >> $BASH_ENV
            
            # 3. تثبيت Tauri CLI
            sudo npm install -g @tauri-apps/cli

      - run:
          name: Install Node Dependencies
          command: |
            npm install --include=optional --platform=linux --arch=x64

      - run:
          name: Initialize and Build Signed APK
          command: |
            source $HOME/.cargo/env
            source $BASH_ENV
            
            # تجهيز المشروع
            tauri android init --ci
            
            # إعدادات التوقيع
            export TAURI_ANDROID_KEYSTORE_PATH="$CIRCLE_WORKING_DIRECTORY/my-release-key.keystore"
            export TAURI_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
            export TAURI_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS
            export TAURI_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
            
            # البناء النهائي
            tauri android build --apk -- --release

      - store_artifacts:
          path: src-tauri/gen/android/app/build/outputs/apk/release/
          destination: apks

workflows:
  version: 2
  build:
    jobs:
      - build-android
