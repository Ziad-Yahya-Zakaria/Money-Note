version: 2.1

jobs:
  build-android:
    docker:
      # صورة مجهزة بـ Android SDK و Java
      - image: cimg/android:2024.01-node
    steps:
      - checkout
      
      - run:
          name: Install Rust and Tauri
          command: |
            # تثبيت Rust
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            
            # إضافة أهداف الأندرويد لـ Rust
            rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
            
            # تثبيت Tauri CLI
            sudo npm install -g @tauri-apps/cli

      - run:
          name: Install Node Dependencies
          command: |
            npm install --include=optional --platform=linux --arch=x64

      - run:
          name: Build Signed APK
          command: |
            # تفعيل Rust للتأكد من وجود Cargo
            source $HOME/.cargo/env
            
            # إعدادات التوقيع
            export TAURI_ANDROID_KEYSTORE_PATH="$CIRCLE_WORKING_DIRECTORY/my-release-key.keystore"
            export TAURI_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEY_PASSWORD
            export TAURI_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS
            export TAURI_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
            
            # البناء النهائي
            tauri android build --apk -- --release

      - store_artifacts:
          path: src-tauri/gen/android/app/build/outputs/apk/release/
          destination: apks

workflows:
  version: 2
  build:
    jobs:
      - build-android
